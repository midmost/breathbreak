<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cat's Cradle</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100vw; height: 100vh; background: #000814; overflow: hidden; }

    #hint {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(0, 255, 220, 0.7);
      font: 11px/1 'Courier New', monospace;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: opacity 1.5s ease;
      pointer-events: none;
      z-index: 10;
    }

    /* subtle corner chevrons for UI framing */
    .corner {
      position: fixed;
      width: 28px; height: 28px;
      border-color: rgba(0,255,220,0.3);
      border-style: solid;
      pointer-events: none;
      z-index: 10;
    }
    .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
    .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
    .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
    .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }
  </style>
</head>
<body>

<div id="hint">Initializing camera…</div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<!-- p5.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>

<script>
'use strict';

/* ================================================================
   CAT'S CRADLE — Neon Hand String Simulator
   MediaPipe Hands + p5.js + Canvas 2D
   ================================================================ */

// ─── Global state ─────────────────────────────────────────────────
const handData = { left: null, right: null };
let   particles = [];
let   touchActive = {};   // per-finger debounce
let   videoEl = null;
let   tick = 0;

// ─── Constants ────────────────────────────────────────────────────
const TIPS      = [4, 8, 12, 16, 20];                     // thumb → pinky
const HUES      = [55, 185, 295, 30, 210];                // HSL hue per fingertip
const TOUCH_PX  = 48;                                     // collision threshold (px)
const MAX_PARTS = 450;

// MediaPipe hand skeleton connections
const BONES = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];

// ─── Particle ─────────────────────────────────────────────────────
class Particle {
  constructor(x, y, hue) {
    this.x = x; this.y = y; this.hue = hue;
    const angle = Math.random() * Math.PI * 2;
    const spd   = Math.random() * 11 + 1.5;
    this.vx = Math.cos(angle) * spd;
    this.vy = Math.sin(angle) * spd;
    this.life  = 1;
    this.decay = 0.022 + Math.random() * 0.032;
    this.r     = Math.random() * 4.5 + 1.5;
  }
  step() {
    this.x += this.vx; this.y += this.vy;
    this.vx *= 0.92;   this.vy *= 0.92;
    this.life -= this.decay;
  }
  dead() { return this.life <= 0; }
}

// ─── MediaPipe init ───────────────────────────────────────────────
(function bootMediaPipe() {
  videoEl = document.createElement('video');
  videoEl.setAttribute('autoplay', '');
  videoEl.setAttribute('playsinline', '');
  Object.assign(videoEl.style, {
    position: 'fixed', top: 0, left: 0,
    width: '1px', height: '1px',
    opacity: 0, pointerEvents: 'none'
  });
  document.body.appendChild(videoEl);

  const mp = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  mp.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.70,
    minTrackingConfidence: 0.55
  });
  mp.onResults(function(res) {
    handData.left = handData.right = null;
    if (!res.multiHandLandmarks) return;
    res.multiHandLandmarks.forEach((lm, i) => {
      const side = res.multiHandedness[i].label.toLowerCase();
      handData[side] = lm;
    });
  });

  new Camera(videoEl, {
    onFrame: async () => { await mp.send({ image: videoEl }); },
    width: 1280, height: 720
  }).start().then(() => {
    const hint = document.getElementById('hint');
    hint.textContent = 'Show both hands  ✦  fingertips connect';
    setTimeout(() => { hint.style.opacity = '0'; }, 4000);
  }).catch(() => {
    document.getElementById('hint').textContent = 'Camera access denied';
  });
}());

// ─── p5.js sketch ─────────────────────────────────────────────────
new p5(function(p) {
  let scanlinesTex;   // pre-rendered CRT scanlines (createGraphics)

  /* ── helpers ── */

  // HSL color string
  function hsl(h, s, l, a) {
    return a != null
      ? `hsla(${h|0},${s}%,${l}%,${a})`
      : `hsl(${h|0},${s}%,${l}%)`;
  }

  // Map normalized MediaPipe landmark → mirrored canvas pixel
  function toPx(lm) {
    return { x: (1 - lm.x) * p.width, y: lm.y * p.height };
  }
  function mapHand(raw) { return raw ? raw.map(toPx) : null; }

  // Build CRT scanline texture
  function buildScanlines() {
    const g = p.createGraphics(p.width, p.height);
    g.clear(); g.noStroke();
    for (let y = 0; y < g.height; y += 3) {
      g.fill(0, 0, 0, 26);
      g.rect(0, y, g.width, 1);
    }
    return g;
  }

  /* ── setup ── */
  p.setup = function() {
    p.createCanvas(p.windowWidth, p.windowHeight);
    p.smooth();
    scanlinesTex = buildScanlines();
  };

  p.windowResized = function() {
    p.resizeCanvas(p.windowWidth, p.windowHeight);
    scanlinesTex = buildScanlines();
  };

  /* ── draw: silhouette video ── */
  function drawVideoSilhouette() {
    if (!videoEl || videoEl.readyState < 2) return;
    const c = p.drawingContext;
    c.save();
    c.globalAlpha = 0.09;
    // Attempt CSS filter for blue-tinted silhouette; falls back gracefully
    try { c.filter = 'grayscale(1) brightness(0.4) sepia(1) hue-rotate(190deg)'; } catch(_) {}
    c.translate(p.width, 0);
    c.scale(-1, 1);
    c.drawImage(videoEl, 0, 0, p.width, p.height);
    c.restore();
  }

  /* ── draw: hand skeleton (bones + glowing joints) ── */
  function drawSkeleton(pts, baseHue) {
    const c = p.drawingContext;

    // Bones
    c.save();
    c.shadowBlur  = 10;
    c.shadowColor = hsl(baseHue, 100, 78);
    c.strokeStyle = hsl(baseHue, 80, 62, 0.65);
    c.lineWidth   = 1.3;
    c.lineCap     = 'round';
    BONES.forEach(([a, b]) => {
      c.beginPath();
      c.moveTo(pts[a].x, pts[a].y);
      c.lineTo(pts[b].x, pts[b].y);
      c.stroke();
    });
    c.restore();

    // Joints (all) + brighter tips
    pts.forEach((pt, i) => {
      const isTip = TIPS.includes(i);
      const fi    = TIPS.indexOf(i);
      const jHue  = isTip ? HUES[fi] : baseHue;
      const r     = isTip ? 7 : 3.8;

      // Outer glow
      c.save();
      c.shadowBlur  = isTip ? 26 : 12;
      c.shadowColor = hsl(jHue, 100, 82);
      c.fillStyle   = hsl(jHue, 90, 68, 0.92);
      c.beginPath();
      c.arc(pt.x, pt.y, r, 0, Math.PI * 2);
      c.fill();

      // Bright specular core
      c.shadowBlur  = 5;
      c.shadowColor = hsl(jHue, 40, 98);
      c.fillStyle   = hsl(jHue, 15, 99, 0.96);
      c.beginPath();
      c.arc(pt.x, pt.y, r * 0.38, 0, Math.PI * 2);
      c.fill();
      c.restore();
    });
  }

  /* ── draw: cat's cradle strings ── */
  function drawStrings(L, R) {
    const c    = p.drawingContext;
    const diag = Math.hypot(p.width, p.height);

    TIPS.forEach((ti, fi) => {
      const A = L[ti], B = R[ti];
      const dist = Math.hypot(B.x - A.x, B.y - A.y);
      const t    = Math.min(dist / (diag * 0.55), 1); // 0=close 1=far

      // Hue drifts as string stretches (cyan→magenta→yellow cycle)
      const h     = (HUES[fi] + t * 95) % 360;
      const thick = 1.5 + (1 - t) * 5.5;  // thick when slack, thin when taut

      // Elastic wobble: oscillates more when slack, damps to zero when taut
      const wobble = 14 * (1 - t) * Math.sin(tick * 0.055 + fi * 1.4);
      const mx = (A.x + B.x) / 2;
      const my = (A.y + B.y) / 2 + wobble;

      // Three-pass laser-beam render: glow → mid → bright core
      const passes = [
        { lw: thick * 4.0,  alpha: 0.22, blur: 50 + t * 35, lit: 52 },
        { lw: thick * 1.6,  alpha: 0.55, blur: 18,           lit: 70 },
        { lw: thick * 0.32, alpha: 0.94, blur: 5,            lit: 98 },
      ];

      passes.forEach(({ lw, alpha, blur, lit }) => {
        c.save();
        c.shadowBlur  = blur;
        c.shadowColor = hsl(h, 100, 82);
        c.strokeStyle = hsl(h, 90, lit, alpha);
        c.lineWidth   = lw;
        c.lineCap     = 'round';
        c.beginPath();
        c.moveTo(A.x, A.y);
        c.quadraticCurveTo(mx, my, B.x, B.y);
        c.stroke();
        c.restore();
      });

      // ── Touch / collision detection ──
      const key = `f${fi}`;
      if (dist < TOUCH_PX) {
        if (!touchActive[key]) {
          touchActive[key] = true;
          spawnExplosion((A.x + B.x) / 2, (A.y + B.y) / 2, h);
        }
      } else {
        touchActive[key] = false;
      }
    });
  }

  /* ── particles ── */
  function spawnExplosion(x, y, hue) {
    const budget = MAX_PARTS - particles.length;
    const count  = Math.min(50, budget);
    for (let i = 0; i < count; i++) {
      particles.push(new Particle(x, y, hue));
    }
  }

  function drawParticles() {
    const c = p.drawingContext;
    // Prune dead first
    particles = particles.filter(pt => !pt.dead());
    particles.forEach(pt => {
      pt.step();
      c.save();
      c.globalAlpha = pt.life * 0.88;
      c.shadowBlur  = 16;
      c.shadowColor = hsl(pt.hue, 100, 82);
      c.fillStyle   = hsl(pt.hue, 100, 70);
      c.beginPath();
      c.arc(pt.x, pt.y, pt.r * pt.life, 0, Math.PI * 2);
      c.fill();
      // tiny bright spark at center
      c.shadowBlur  = 4;
      c.fillStyle   = hsl(pt.hue, 30, 98);
      c.beginPath();
      c.arc(pt.x, pt.y, pt.r * pt.life * 0.3, 0, Math.PI * 2);
      c.fill();
      c.restore();
    });
  }

  /* ── vignette ── */
  function drawVignette() {
    const c = p.drawingContext;
    c.save();
    const grad = c.createRadialGradient(
      p.width / 2, p.height / 2, p.height * 0.25,
      p.width / 2, p.height / 2, p.height * 0.95
    );
    grad.addColorStop(0, 'rgba(0,4,20,0)');
    grad.addColorStop(1, 'rgba(0,4,20,0.78)');
    c.fillStyle = grad;
    c.fillRect(0, 0, p.width, p.height);
    c.restore();
  }

  /* ── FPS counter (top-right) ── */
  function drawFPS() {
    const c = p.drawingContext;
    c.save();
    c.font = '10px Courier New';
    c.fillStyle = 'rgba(0,255,200,0.28)';
    c.textAlign = 'right';
    c.fillText(`${p.frameRate().toFixed(0)} fps`, p.width - 16, p.height - 14);
    c.restore();
  }

  /* ── main draw loop ── */
  p.draw = function() {
    tick++;

    // 1 · Clear with deep midnight blue
    p.background('#000814');

    // 2 · Ghost video silhouette
    drawVideoSilhouette();

    // 3 · CRT scanlines (drawn over video, under everything else)
    p.image(scanlinesTex, 0, 0);

    // 4 · Resolve landmark positions for this frame
    const L = mapHand(handData.left);
    const R = mapHand(handData.right);

    // 5 · Cat's cradle strings (render before skeletons so tips are on top)
    if (L && R) drawStrings(L, R);

    // 6 · Hand skeletons: left = magenta, right = cyan
    if (L) drawSkeleton(L, 295);
    if (R) drawSkeleton(R, 185);

    // 7 · Particle explosions
    drawParticles();

    // 8 · Edge vignette
    drawVignette();

    // 9 · FPS (dev info)
    drawFPS();
  };

}); // end p5 sketch
</script>
</body>
</html>
